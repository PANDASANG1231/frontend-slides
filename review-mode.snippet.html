<!-- ============================================================
     REVIEW MODE SNIPPET v1.0
     Inject this entire block before </body> in any HTML slide.

     Usage:
       - Press Ctrl+E  (or click ✦ Review badge, top-left)
       - Click any element  → blue border, CSS selector captured
       - Drag to select region  → orange dashed box, coordinates captured
       - Write suggestion in sidebar → Save
       - Export .md → downloads suggestions.md
     ============================================================ -->

<style id="__review-styles">
#__rb{position:fixed;top:16px;left:16px;z-index:9000;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(8px);border-radius:8px;padding:6px 10px;font-size:11px;color:rgba(255,255,255,.4);cursor:pointer;font-family:ui-monospace,monospace;letter-spacing:.04em;transition:all .2s;user-select:none}
#__rb:hover{color:rgba(255,255,255,.8);border-color:rgba(255,255,255,.25)}
#__rb.on{background:rgba(99,102,241,.9);border-color:#6366f1;color:#fff}
#__rl{display:none;position:fixed;inset:0;z-index:8000;overflow:hidden}
#__rl.on{display:block}
#__rc{position:absolute;inset:0;cursor:crosshair;user-select:none;-webkit-user-select:none}
#__pins{display:none;position:absolute;top:0;left:0;width:100%;min-height:100vh;pointer-events:none;z-index:7999}
#__pins.on{display:block}
#__hb,#__db{position:absolute;pointer-events:none;border-radius:3px;display:none}
#__hb{border:2px solid rgba(99,102,241,.7);background:rgba(99,102,241,.07)}
#__db{border:2px dashed #f59e0b;background:rgba(245,158,11,.07)}
.__rpin{position:absolute;pointer-events:none;border-radius:3px}
.__rpin-dom{border:2px solid #6366f1;background:rgba(99,102,241,.1)}
.__rpin-drag{border:2px dashed #f59e0b;background:rgba(245,158,11,.08)}
.__rpnum{position:absolute;top:-9px;left:-9px;width:18px;height:18px;background:#6366f1;color:#fff;border-radius:50%;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,monospace}
.__rpin-drag .__rpnum{background:#f59e0b;color:#000}
#__rp{position:fixed;top:0;right:-380px;width:360px;height:100vh;background:#111118;border-left:1px solid rgba(255,255,255,.08);z-index:9500;display:flex;flex-direction:column;transition:right .3s cubic-bezier(.4,0,.2,1);font-family:ui-sans-serif,system-ui,sans-serif}
#__rp.open{right:0}
.__rph{padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:8px;flex-shrink:0}
.__rpt{font-size:13px;font-weight:600;color:#e8e8e8;flex:1}
.__rpcl{width:24px;height:24px;background:rgba(255,255,255,.06);border:none;border-radius:5px;color:#888;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.__rpcl:hover{background:rgba(255,255,255,.12);color:#ccc}
.__rpf{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.__rptg{font-size:11px;color:#6366f1;margin-bottom:8px;font-family:ui-monospace,monospace;padding:4px 8px;background:rgba(99,102,241,.1);border-radius:4px;display:none;align-items:center;gap:6px}
.__rptg.vis{display:flex}
.__rptgd{width:6px;height:6px;background:#6366f1;border-radius:50%;flex-shrink:0}
.__rpf textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e8e8e8;font-size:13px;font-family:inherit;padding:10px 12px;resize:none;outline:none;line-height:1.6;transition:border-color .15s;min-height:80px}
.__rpf textarea:focus{border-color:rgba(99,102,241,.5)}
.__rpf textarea::placeholder{color:#555}
.__rpfa{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
.__rpbtn{font-size:12px;padding:6px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.1);cursor:pointer;background:transparent;color:#888;font-family:inherit;transition:all .15s}
.__rpbtn:hover{color:#ccc;border-color:rgba(255,255,255,.2)}
.__rpbtn.save{background:#6366f1;border-color:#6366f1;color:#fff;font-weight:500}
.__rpbtn.save:hover{background:#5558e0}
.__rpbtn.save:disabled{opacity:.4;cursor:not-allowed}
.__rpl{flex:1;overflow-y:auto;padding:8px 0}
.__rpl::-webkit-scrollbar{width:4px}
.__rpl::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.__rpem{padding:2rem 16px;text-align:center;color:#444;font-size:12px;line-height:1.8}
.__rpi{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);position:relative;transition:background .15s}
.__rpi:hover{background:rgba(255,255,255,.02)}
.__rpim{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.__rpin2{width:18px;height:18px;background:#6366f1;border-radius:50%;font-size:9px;font-weight:600;color:#fff;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,monospace;flex-shrink:0}
.__rpin2.drag{background:#f59e0b;color:#000}
.__rpis{font-size:10px;color:#555;font-family:ui-monospace,monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.__rpid{width:18px;height:18px;background:transparent;border:none;border-radius:4px;color:#444;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;opacity:0}
.__rpi:hover .__rpid{opacity:1}
.__rpid:hover{background:rgba(239,68,68,.15);color:#ef4444}
.__rpit{font-size:12px;color:#bbb;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.__rpft{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06);display:flex;gap:8px;align-items:center;flex-shrink:0}
.__rpfc{font-size:11px;color:#555;flex:1}
.__rpex{font-size:12px;padding:7px 14px;border-radius:6px;border:1px solid rgba(99,102,241,.4);cursor:pointer;background:rgba(99,102,241,.1);color:#a5b4fc;font-family:inherit;transition:all .15s;font-weight:500}
.__rpex:hover{background:rgba(99,102,241,.2);border-color:#6366f1;color:#c7d2fe}
.__rpex:disabled{opacity:.3;cursor:not-allowed}
#__rbar{position:fixed;bottom:0;left:0;right:0;height:32px;background:rgba(99,102,241,.9);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;gap:20px;z-index:8500;font-size:11px;color:rgba(255,255,255,.9);font-family:ui-monospace,monospace;letter-spacing:.04em}
#__rbar.on{display:flex}
.__rbsep{opacity:.3}
.__rbd{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4)}
.__rbd.on{background:#fff}
#__rtoast{position:fixed;bottom:52px;left:50%;transform:translateX(-50%) translateY(8px);background:#1e1e2e;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 16px;font-size:12px;color:#a5b4fc;z-index:99999;opacity:0;pointer-events:none;transition:all .25s;white-space:nowrap;font-family:ui-sans-serif,system-ui,sans-serif}
#__rtoast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<div id="__rb" title="Ctrl+E — Toggle Review Mode">✦ Review</div>
<div id="__rl">
  <div id="__rc"></div>
  <div id="__hb"></div>
  <div id="__db"></div>
</div>
<div id="__pins"></div>
<div id="__rp">
  <div class="__rph">
    <span class="__rpt">✦ Suggestions</span>
    <button class="__rpcl" id="__rpcl">✕</button>
  </div>
  <div class="__rpf">
    <div class="__rptg" id="__rptg"><span class="__rptgd" id="__rptgd"></span><span id="__rptgt">—</span></div>
    <textarea id="__rpta" placeholder="Describe the change you want…&#10;e.g. Make this heading larger, change color to #fff"></textarea>
    <div class="__rpfa">
      <button class="__rpbtn" id="__rpclr">Clear</button>
      <button class="__rpbtn save" id="__rpsv" disabled>Save</button>
    </div>
  </div>
  <div class="__rpl" id="__rpl"><div class="__rpem" id="__rpem">Click any element<br>or drag to select a region<br>then write your suggestion</div></div>
  <div class="__rpft">
    <span class="__rpfc" id="__rpfc">0 suggestions</span>
    <button class="__rpex" id="__rpex" disabled>Export .md</button>
  </div>
</div>
<div id="__rbar">
  <span style="display:flex;align-items:center;gap:5px"><span class="__rbd on" id="__rbd1"></span> Click to pick element</span>
  <span class="__rbsep">|</span>
  <span style="display:flex;align-items:center;gap:5px"><span class="__rbd" id="__rbd2"></span> Drag to select region</span>
  <span class="__rbsep">|</span>
  <span>Ctrl+E to exit</span>
</div>
<div id="__rtoast"></div>

<script>
(function(){
  var S={active:false,suggestions:[],nextId:1,pending:null,dragging:false,dragStart:null,justDragged:false};
  var $=function(id){return document.getElementById(id)};
  var badge=$('__rb'),layer=$('__rl'),cursor=$('__rc'),hb=$('__hb'),db=$('__db'),pins=$('__pins');
  var panel=$('__rp'),closebtn=$('__rpcl'),tgtEl=$('__rptg'),tgtDot=$('__rptgd'),tgtTxt=$('__rptgt');
  var ta=$('__rpta'),clrBtn=$('__rpclr'),svBtn=$('__rpsv');
  var list=$('__rpl'),empty=$('__rpem'),cnt=$('__rpfc'),expBtn=$('__rpex');
  var bar=$('__rbar'),dot1=$('__rbd1'),dot2=$('__rbd2'),toast=$('__rtoast');

  function toggle(){
    S.active=!S.active;
    badge.classList.toggle('on',S.active);
    layer.classList.toggle('on',S.active);
    pins.classList.toggle('on',S.active);
    bar.classList.toggle('on',S.active);
    if(S.active){panel.classList.add('open');showToast('Review Mode — click or drag to select');}
    else{panel.classList.remove('open');hb.style.display='none';clearPending();}
  }

  document.addEventListener('keydown',function(e){
    if(e.ctrlKey&&e.key==='e'){e.preventDefault();toggle();}
    if(e.key==='Escape'&&S.active)toggle();
  });
  badge.addEventListener('click',toggle);
  closebtn.addEventListener('click',function(){panel.classList.remove('open');});

  function elAt(x,y){
    layer.style.display='none';
    var el=document.elementFromPoint(x,y);
    layer.style.display='block';
    return el;
  }

  function rStyle(r){return 'display:block;left:'+r.left+'px;top:'+r.top+'px;width:'+r.width+'px;height:'+r.height+'px';}

  function getSel(el){
    if(!el||el===document.body)return 'body';
    if(el.id)return '#'+el.id;
    var s=el.tagName.toLowerCase();
    var cls=[].slice.call(el.classList).filter(function(c){return c.indexOf('__r')<0;}).slice(0,2).join('.');
    if(cls)s+='.'+cls;
    var p=el.parentElement;
    if(p){
      var sibs=[].slice.call(p.children).filter(function(c){return c.tagName===el.tagName;});
      if(sibs.length>1)s+=':nth-child('+([].slice.call(p.children).indexOf(el)+1)+')';
    }
    return s;
  }

  cursor.addEventListener('mousemove',function(e){
    if(S.dragging)return;
    var el=elAt(e.clientX,e.clientY);
    if(!el||el===document.body||el===document.documentElement){hb.style.display='none';return;}
    var r=el.getBoundingClientRect();
    hb.style.cssText=rStyle({left:r.left,top:r.top,width:r.width,height:r.height});
    dot1.className='__rbd on';dot2.className='__rbd';
  });
  cursor.addEventListener('mouseleave',function(){hb.style.display='none';});

  cursor.addEventListener('click',function(e){
    if(S.dragging||S.justDragged){S.justDragged=false;return;}
    var el=elAt(e.clientX,e.clientY);
    if(!el||el===document.body)return;
    var r=el.getBoundingClientRect();
    var sx=window.scrollX||window.pageXOffset,sy=window.scrollY||window.pageYOffset;
    setPending({type:'dom',selector:getSel(el),rect:{left:r.left+sx,top:r.top+sy,width:r.width,height:r.height},el:el});
  });

  cursor.addEventListener('mousedown',function(e){
    if(e.button!==0)return;
    e.preventDefault();
    S.dragging=false;S.dragStart={x:e.clientX,y:e.clientY};
  });
  cursor.addEventListener('mousemove',function(e){
    if(!S.dragStart)return;
    var dx=e.clientX-S.dragStart.x,dy=e.clientY-S.dragStart.y;
    if(!S.dragging&&(Math.abs(dx)>6||Math.abs(dy)>6)){
      S.dragging=true;db.style.display='block';hb.style.display='none';
      dot2.className='__rbd on';dot1.className='__rbd';
    }
    if(S.dragging){
      var l=Math.min(S.dragStart.x,e.clientX),t=Math.min(S.dragStart.y,e.clientY);
      db.style.cssText='display:block;left:'+l+'px;top:'+t+'px;width:'+Math.abs(dx)+'px;height:'+Math.abs(dy)+'px';
    }
  });
  cursor.addEventListener('mouseup',function(e){
    if(!S.dragStart)return;
    if(S.dragging){
      var sx=window.scrollX||window.pageXOffset,sy=window.scrollY||window.pageYOffset;
      var l=Math.min(S.dragStart.x,e.clientX)+sx,t=Math.min(S.dragStart.y,e.clientY)+sy;
      var w=Math.abs(e.clientX-S.dragStart.x),h=Math.abs(e.clientY-S.dragStart.y);
      db.style.display='none';
      if(w>10&&h>10)setPending({type:'drag',selector:'region('+Math.round(l)+','+Math.round(t)+','+Math.round(w)+','+Math.round(h)+')',rect:{left:l,top:t,width:w,height:h}});
      S.justDragged=true;
    }
    S.dragging=false;S.dragStart=null;dot2.className='__rbd';dot1.className='__rbd on';
  });

  function setPending(p){
    S.pending=p;
    tgtTxt.textContent=p.selector;
    tgtEl.classList.add('vis');
    tgtDot.style.background=p.type==='drag'?'#f59e0b':'#6366f1';
    ta.focus();updateSave();
  }
  function clearPending(){S.pending=null;tgtEl.classList.remove('vis');ta.value='';updateSave();}
  function updateSave(){svBtn.disabled=!S.pending||ta.value.trim()==='';}
  ta.addEventListener('input',updateSave);
  clrBtn.addEventListener('click',clearPending);

  svBtn.addEventListener('click',function(){
    var text=ta.value.trim();
    if(!text||!S.pending)return;
    var s={id:S.nextId++,type:S.pending.type,selector:S.pending.selector,rect:S.pending.rect,text:text,ts:new Date().toISOString(),el:S.pending.el||null};
    S.suggestions.push(s);
    addPin(s);renderList();updateFooter();
    clearPending();showToast('Suggestion #'+s.id+' saved');
  });

  function addPin(s){
    var pin=document.createElement('div');
    pin.className='__rpin __rpin-'+s.type;
    pin.style.cssText=rStyle(s.rect);
    pin.dataset.id=s.id;
    if(s.el)pin.dataset.selector=s.selector;
    var num=document.createElement('div');
    num.className='__rpnum';num.textContent=s.id;
    pin.appendChild(num);pins.appendChild(pin);
  }
  function removePin(id){var p=pins.querySelector('[data-id="'+id+'"]');if(p)p.remove();}

  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function renderList(){
    if(!S.suggestions.length){list.innerHTML='';list.appendChild(empty);return;}
    list.innerHTML='';
    S.suggestions.forEach(function(s){
      var d=document.createElement('div');d.className='__rpi';
      d.innerHTML='<div class="__rpim"><div class="__rpin2'+(s.type==='drag'?' drag':'')+'">'+s.id+'</div><span class="__rpis">'+esc(s.selector)+'</span><button class="__rpid" data-id="'+s.id+'" title="Delete">✕</button></div><div class="__rpit">'+esc(s.text)+'</div>';
      list.appendChild(d);
    });
    list.querySelectorAll('.__rpid').forEach(function(btn){
      btn.addEventListener('click',function(){
        var id=parseInt(btn.dataset.id);
        S.suggestions=S.suggestions.filter(function(s){return s.id!==id;});
        removePin(id);renderList();updateFooter();
      });
    });
  }

  function updateFooter(){
    var n=S.suggestions.length;
    cnt.textContent=n+' suggestion'+(n!==1?'s':'');
    expBtn.disabled=n===0;
  }

  function updatePins(){
    var sx=window.scrollX||window.pageXOffset,sy=window.scrollY||window.pageYOffset;
    S.suggestions.forEach(function(s){
      if(s.type==='dom'&&s.el&&document.body.contains(s.el)){
        var r=s.el.getBoundingClientRect();
        s.rect={left:r.left+sx,top:r.top+sy,width:r.width,height:r.height};
        var pin=pins.querySelector('[data-id="'+s.id+'"]');
        if(pin)pin.style.cssText=rStyle(s.rect);
      }
    });
  }
  window.addEventListener('scroll',updatePins,{passive:true});
  window.addEventListener('resize',updatePins,{passive:true});

  expBtn.addEventListener('click',function(){
    var lines=['# Design Review Suggestions','',
      '> Generated: '+new Date().toLocaleString(),
      '> File: '+document.title,'','---',''];
    S.suggestions.forEach(function(s){
      lines.push('## Suggestion #'+s.id+' — '+(s.type==='drag'?'📐 Region':'🎯 Element'),'');
      lines.push('**Target:** `'+s.selector+'`');
      if(s.type==='drag'){var r=s.rect;lines.push('**Region:** x='+Math.round(r.left)+', y='+Math.round(r.top)+', '+Math.round(r.width)+'×'+Math.round(r.height)+'px');}
      lines.push('**Saved:** '+s.ts,'',s.text,'','---','');
    });
    var blob=new Blob([lines.join('\n')],{type:'text/markdown'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download='suggestions.md';a.click();
    URL.revokeObjectURL(url);showToast('suggestions.md downloaded');
  });

  var toastTimer;
  function showToast(msg){
    toast.textContent=msg;toast.classList.add('show');
    clearTimeout(toastTimer);toastTimer=setTimeout(function(){toast.classList.remove('show');},2200);
  }

  renderList();updateFooter();
})();
</script>
